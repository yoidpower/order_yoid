services:
  order_yoid:
    build: .
    container_name: order_yoid
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - VIRTUAL_HOST=order.yoidpower.com
      - LETSENCRYPT_HOST=order.yoidpower.com
      - LETSENCRYPT_EMAIL=admin@yoidpower.com
    env_file:
      - .env
    volumes:
      - ./images:/var/www/html/images:ro
    networks:
      - proxy-tier
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  proxy-tier:
    name: yoidpower_proxy-tier
    external: true
