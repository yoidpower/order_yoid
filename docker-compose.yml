services:
  order_yoid:
    build: .
    container_name: order_yoid
    restart: unless-stopped
    ports:
      - "8082:80"
    env_file:
      - .env
    volumes:
      - ./images:/var/www/html/images:ro
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
